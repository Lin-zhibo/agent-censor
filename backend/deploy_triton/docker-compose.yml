version: "3.8"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.01-py3
    command: >
      tritonserver
      --model-repository=/models
      --http-port=8000
      --metrics-port=8002
      --strict-model-config=false
    volumes:
      - ./triton:/models:ro
    ports:
      - "8000:8000"
      - "8002:8002"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  gateway:
    build: ./gateway
    ports:
      - "8001:8001"
    environment:
      - TRITON_URL=http://triton:8000
    depends_on:
      triton:
        condition: service_healthy
